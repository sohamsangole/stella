<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stella - AI Software Engineer</title>
    <style>
        body {
            background-color: #071a38;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
            padding: 0 20px;
        }

        .logo {
            width: 180px;
            height: auto;
            margin-bottom: 15px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2);
        }

        h1 {
            font-size: 3.5rem;
            margin-bottom: 10px;
            font-weight: 800;
            letter-spacing: -1px;
            margin-top: 0;
        }

        p {
            max-width: 600px;
            font-size: 1.2rem;
            line-height: 1.6;
            color: #b3c1d1;
            margin-bottom: 30px;
        }

        code {
            background-color: #041126;
            color: #58a6ff;
            padding: 3px 8px;
            border-radius: 6px;
            font-family: ui-monospace, SFMono-Regular, monospace;
            font-size: 0.9em;
        }

        a {
            color: #ffffff;
            text-decoration: none;
            border: 1px solid #ffffff;
            padding: 12px 24px;
            border-radius: 6px;
            font-weight: 600;
            transition: all 0.2s ease;
        }

        a:hover {
            background-color: #ffffff;
            color: #071a38;
        }
    </style>
</head>

<body>

    <img src="../stella.png" alt="Stella Logo" class="logo">
    <h1>Stella</h1>
    <p>A self-hosted, open-source AI software engineer. Mention <code>@coding-agent-stella</code> in any GitHub issue.
        Stella reads the context, writes the code, runs tests, and opens a Pull Request.</p>

    <a href="https://github.com/sohamsangole/stella" target="_blank">View on GitHub</a>

</body>

</html>
