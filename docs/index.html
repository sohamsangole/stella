<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stella - AI Software Engineer</title>
    <style>
        body {
            background-color: #0d1117;
            color: #c9d1d9;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
            padding: 0 20px;
        }
        h1 {
            font-size: 3.5rem;
            margin-bottom: 10px;
            font-weight: 800;
            letter-spacing: -1px;
        }
        p {
            max-width: 600px;
            font-size: 1.2rem;
            line-height: 1.6;
            color: #8b949e;
            margin-bottom: 30px;
        }
        code {
            background-color: #161b22;
            color: #7ee787;
            padding: 3px 8px;
            border-radius: 6px;
            font-family: ui-monospace, SFMono-Regular, monospace;
            font-size: 0.9em;
        }
        a {
            color: #58a6ff;
            text-decoration: none;
            border: 1px solid #30363d;
            padding: 12px 24px;
            border-radius: 6px;
            font-weight: 600;
            transition: all 0.2s ease;
        }
        a:hover {
            background-color: #161b22;
            border-color: #58a6ff;
        }
    </style>
</head>
<body>

    <h1>Stella</h1>
    <p>A self-hosted, open-source AI software engineer. Mention <code>@coding-agent-stella</code> in any GitHub issue. Stella reads the context, writes the code, runs tests, and opens a Pull Request.</p>
    
    <a href="https://github.com/sohamsangole/stella" target="_blank">View on GitHub</a>
